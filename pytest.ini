[pytest]
# pytest 配置文件

# 测试文件匹配模式
python_files = test_*.py *_test.py

# 测试类匹配模式
python_classes = Test*

# 测试函数匹配模式
python_functions = test_*

# 标记定义（必须在 addopts 之前）
markers =
    smoke: 冒烟测试
    regression: 回归测试
    drama_home: 首页测试
    player: 播放器测试
    profile: 个人中心测试
    carousel: 轮播图测试
    search: 搜索页面测试

# 命令行选项
addopts =
    -v
    -s
    --strict-markers
    --tb=short
    --disable-warnings
    --color=yes
    --dist=loadscope
    --self-contained-html

# 测试路径
testpaths = page
